<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz - Admin Console</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #151f32;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --success: #10b981;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #233554;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        
        .container { max-width: 700px; margin: 40px auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }
        
        h2 { margin-bottom: 5px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        p { color: var(--muted); margin-bottom: 25px; font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; font-size: 1rem; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--accent); color: #0b0f19; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        
        .panel { display: none; }
        .panel.active { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .step-badge { background: var(--border); color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- LOGIN PANEL -->
        <div id="panel-login" class="card panel active">
            <h2>Operation Baaz Admin</h2>
            <p>Access command controls</p>
            
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="email" placeholder="admin@webnocks.work">
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="loginAdmin()">Authorize Control Panel</button>
        </div>

        <!-- CONTROL PANEL -->
        <div id="panel-control" class="card panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Control Dashboard</h2>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem;">Logout</button>
            </div>

            <!-- STEP A: CREATE MOCK SHEET -->
            <div id="sec-mock-config" style="border-bottom: 1px dashed var(--border); padding-bottom: 25px; margin-bottom: 25px;">
                <span class="step-badge">STEP A: INITIALIZE MOCK CONFIG</span>
                <div class="form-group">
                    <label>Mock Exam Title</label>
                    <input type="text" id="mock-title" placeholder="e.g., UP Police Constable Mock 01">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Subject / Category</label>
                        <input type="text" id="mock-subject" placeholder="e.g., General Studies">
                    </div>
                    <div class="form-group">
                        <label>Timer Duration (Minutes)</label>
                        <input type="number" id="mock-timer" placeholder="e.g., 60">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Positive Marks (+)</label>
                        <input type="number" id="mock-pos" value="3">
                    </div>
                    <div class="form-group">
                        <label>Negative Marks (-)</label>
                        <input type="number" id="mock-neg" value="1">
                    </div>
                </div>
                <button class="btn" style="background:#10b981; color:white;" onclick="lockMockConfig()">Lock & Create Mock Sheet</button>
            </div>

            <!-- STEP B: INJECT QUESTIONS -->
            <div id="sec-question-config" style="opacity: 0.4; pointer-events: none;">
                <span class="step-badge">STEP B: INJECT QUESTIONS</span>
                <p id="active-mock-status" style="margin-bottom: 15px; color: #10b981; font-weight: 600;">No active mock initialized yet.</p>
                
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea id="q-text" rows="3" placeholder="Type question content statement here..."></textarea>
                </div>
                
                <div class="grid-2">
                    <div class="form-group"><label>Option A</label><input type="text" id="opt-0"></div>
                    <div class="form-group"><label>Option B</label><input type="text" id="opt-1"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Option C</label><input type="text" id="opt-2"></div>
                    <div class="form-group"><label>Option D</label><input type="text" id="opt-3"></div>
                </div>

                <div class="form-group">
                    <label>Correct Answer Option</label>
                    <select id="q-correct">
                        <option value="0">Option A</option>
                        <option value="1">Option B</option>
                        <option value="2">Option C</option>
                        <option value="3">Option D</option>
                    </select>
                </div>
                <button class="btn" onclick="pushQuestionToCloud()">Push Question to Live Database</button>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoELSNjBXkjMgtqe3jgOdhNVTu8F8Fx_14",
            authDomain: "operation-baaz.firebaseapp.com",
            projectId: "operation-baaz",
            storageBucket: "operation-baaz.firebasestorage.app",
            messagingSenderId: "229131380430",
            appId: "1:229131380430:web:6bfd5074729faf73af929f",
            measurementId: "G-EP5YRKFY1P"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeMockId = null;

        function loginAdmin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if(!email || !pass) return alert('Enter credentials fields!');

            auth.signInWithEmailAndPassword(email, pass).then(res => {
                db.collection('users').doc(res.user.uid).get().then(doc => {
                    if(doc.exists && doc.data().role === 'admin') {
                        document.getElementById('panel-login').classList.remove('active');
                        document.getElementById('panel-control').classList.add('active');
                    } else {
                        auth.signOut();
                        alert('Access Denied! You are not registered as an administrator.');
                    }
                });
            }).catch(err => alert(err.message));
        }

        function lockMockConfig() {
            const title = document.getElementById('mock-title').value.trim();
            const subject = document.getElementById('mock-subject').value.trim();
            const timer = document.getElementById('mock-timer').value;
            const posMark = document.getElementById('mock-pos').value;
            const negMark = document.getElementById('mock-neg').value;

            if(!title || !subject || !timer) return alert('Fill all mock configuration parameters!');

            db.collection('mocks').add({
                title: title,
                subject: subject,
                timer: timer,
                posMark: posMark,
                negMark: negMark,
                status: 'active',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(docRef => {
                activeMockId = docRef.id;
                document.getElementById('active-mock-status').innerText = `Active Session: ${title} (${activeMockId})`;
                document.getElementById('sec-mock-config').style.opacity = "0.4";
                document.getElementById('sec-mock-config').style.pointerEvents = "none";
                document.getElementById('sec-question-config').style.opacity = "1";
                document.getElementById('sec-question-config').style.pointerEvents = "all";
                alert('Mock configuration locked successfully! Ready to inject questions.');
            }).catch(err => alert(err.message));
        }

        function pushQuestionToCloud() {
            const text = document.getElementById('q-text').value.trim();
            const opts = [
                document.getElementById('opt-0').value.trim(),
                document.getElementById('opt-1').value.trim(),
                document.getElementById('opt-2').value.trim(),
                document.getElementById('opt-3').value.trim()
            ];
            const correct = document.getElementById('q-correct').value;

            if(!text || opts.some(o => !o)) return alert('Complete question statements and options payload!');

            db.collection('questions').add({
                mockId: activeMockId,
                text: text,
                options: opts,
                correct: correct,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert('Question pushed successfully!');
                document.getElementById('q-text').value = "";
                document.getElementById('opt-0').value = "";
                document.getElementById('opt-1').value = "";
                document.getElementById('opt-2').value = "";
                document.getElementById('opt-3').value = "";
            }).catch(err => alert(err.message));
        }
    </script>
</body>
</html>
