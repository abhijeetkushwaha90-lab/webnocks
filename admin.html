<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz - Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .form-card {
            background-color: #161b22;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center bg-[#161b22] border border-[#30363d] rounded-xl p-6 mb-8 shadow-xl">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <i class="fas fa-user-shield text-blue-500"></i> Operation Baaz <span class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2.5 py-1 rounded-full font-normal">Admin Panel</span>
                </h1>
                <p class="text-sm text-gray-400 mt-1">Add and manage mock test papers.</p>
            </div>
            <a href="index.html" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] text-gray-200 px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm">
                <i class="fas fa-arrow-left"></i> Student Portal
            </a>
        </header>

        <div class="form-card rounded-xl p-8 shadow-xl mb-8">
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-plus-circle text-emerald-500"></i> Upload New Mock Test
            </h2>
            <form id="add-test-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Test Title / Name</label>
                    <input type="text" id="test-title" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Mathematics Mock Test">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Short Description</label>
                    <textarea id="test-desc" required rows="3" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Exam URL / Live Link</label>
                    <input type="url" id="test-link" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition font-mono">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg transition cursor-pointer flex items-center justify-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> Publish Live Test
                </button>
            </form>
        </div>

        <div>
            <h2 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-list text-blue-500"></i> Live Tests History
            </h2>
            <div id="admin-tests-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            <div id="admin-no-tests" class="hidden text-center py-12 form-card rounded-xl">
                <i class="fas fa-folder-open text-gray-600 text-4xl mb-2"></i>
                <p class="text-gray-400">No mock tests published yet.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOeLSNjBXkjMgtqe3jgOdhNVTu8F8Fx_14",
            authDomain: "operation-baaz.firebaseapp.com",
            projectId: "operation-baaz",
            storageBucket: "operation-baaz.firebasestorage.app",
            messagingSenderId: "229131380430",
            appId: "1:229131380430:web:e9b77b1703ee62a1af929f",
            measurementId: "G-DRNSDYSN6B"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const addTestForm = document.getElementById('add-test-form');
        const adminTestsList = document.getElementById('admin-tests-list');
        const adminNoTests = document.getElementById('admin-no-tests');

        loadAdminTests();

        addTestForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('test-title').value.trim();
            const desc = document.getElementById('test-desc').value.trim();
            const link = document.getElementById('test-link').value.trim();

            db.collection('tests').add({
                title: title,
                description: desc,
                link: link,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert('Success! Mock Test published.');
                addTestForm.reset();
                loadAdminTests();
            })
            .catch(err => alert("Database Error: " + err.message));
        });

        function loadAdminTests() {
            adminTestsList.innerHTML = '';
            db.collection('tests').orderBy('createdAt', 'desc').get().then(snapshot => {
                if (snapshot.empty) {
                    adminNoTests.classList.remove('hidden');
                    return;
                }
                adminNoTests.classList.add('hidden');
                snapshot.forEach(doc => {
                    const test = doc.data();
                    const card = document.createElement('div');
                    card.className = 'form-card rounded-xl p-5 shadow-sm border-l-4 border-l-emerald-500 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-bold text-white text-lg line-clamp-1">${test.title || 'Untitled Test'}</h3>
                                <button onclick="deleteTest('${doc.id}')" class="text-gray-500 hover:text-rose-500 transition px-1.5 py-0.5 text-sm cursor-pointer">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                            <p class="text-gray-400 text-xs mt-2 line-clamp-2">${test.description || 'No description.'}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-[#30363d] flex items-center justify-between text-xs text-gray-500">
                            <span class="truncate max-w-[180px] font-mono">${test.link}</span>
                            <a href="${test.link}" target="_blank" class="text-blue-400 hover:underline flex items-center gap-1">
                                Preview <i class="fas fa-external-link-alt text-[10px]"></i>
                            </a>
                        </div>
                    `;
                    adminTestsList.appendChild(card);
                });
            });
        }

        window.deleteTest = function(docId) {
            if (confirm("Delete this test?")) {
                db.collection('tests').doc(docId).delete().then(() => {
                    alert("Deleted.");
                    loadAdminTests();
                });
            }
        }
    </script>
</body>
</html>
