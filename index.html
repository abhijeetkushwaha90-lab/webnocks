<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz - Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .form-card { background-color: #161b22; border: 1px solid #30363d; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="auth-container" class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-card rounded-xl p-8 shadow-xl flex flex-col justify-between">
            <div>
                <h2 class="text-3xl font-bold text-white mb-2 flex items-center gap-2">
                    <i class="fas fa-user-graduate text-blue-500"></i> Student Login
                </h2>
                <p class="text-gray-400 mb-6 text-sm">Already registered? Enter your details.</p>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                        <input type="email" id="login-email" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition" placeholder="name@example.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                        <input type="password" id="login-password" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-blue-500/20 transition cursor-pointer mt-4">Login</button>
                </form>
            </div>
        </div>
        <div class="form-card rounded-xl p-8 shadow-xl border-emerald-900/50 flex flex-col justify-between">
            <div>
                <h2 class="text-3xl font-bold text-white mb-2 flex items-center gap-2">
                    <i class="fas fa-user-plus text-emerald-500"></i> New Registration
                </h2>
                <p class="text-gray-400 mb-6 text-sm">Create your new student profile.</p>
                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
                        <input type="text" id="register-name" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition" placeholder="Your Name">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                        <input type="email" id="register-email" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition" placeholder="name@example.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                        <input type="password" id="register-password" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-emerald-500/20 transition cursor-pointer mt-4">Register Profile</button>
                </form>
            </div>
        </div>
    </div>
    <div id="dashboard-container" class="hidden w-full max-w-6xl">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#161b22] border border-[#30363d] rounded-xl p-6 mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Welcome Back, <span id="student-name" class="text-blue-400">Student</span>!</h1>
                <p class="text-sm text-gray-400 mt-1">Email: <span id="student-email" class="font-mono"></span></p>
            </div>
            <button id="logout-btn" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-lg font-semibold shadow-lg hover:shadow-rose-500/20 transition cursor-pointer flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </header>
        <main>
            <h2 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-file-alt text-blue-500"></i> Available Mock Tests
            </h2>
            <div id="tests-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="no-tests" class="hidden text-center py-12 form-card rounded-xl">
                <i class="fas fa-folder-open text-gray-600 text-5xl mb-3"></i>
                <p class="text-gray-400 text-lg">No mock tests available at the moment.</p>
            </div>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script>
        // FIXED API KEY IN CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBOeLSNjBXkjMgtqe3jgOdhNVTu8F8Fx_14",
            authDomain: "operation-baaz.firebaseapp.com",
            projectId: "operation-baaz",
            storageBucket: "operation-baaz.firebasestorage.app",
            messagingSenderId: "229131380430",
            appId: "1:229131380430:web:e9b77b1703ee62a1af929f",
            measurementId: "G-DRNSDYSN6B"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const authContainer = document.getElementById('auth-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const studentNameDisplay = document.getElementById('student-name');
        const studentEmailDisplay = document.getElementById('student-email');
        const testsList = document.getElementById('tests-list');
        const noTests = document.getElementById('no-tests');
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('students').doc(user.uid).get().then(doc => {
                    studentNameDisplay.innerText = doc.exists ? (doc.data().name || "Student") : "Student";
                    studentEmailDisplay.innerText = user.email;
                    authContainer.classList.add('hidden');
                    dashboardContainer.classList.remove('hidden');
                    loadMockTests();
                }).catch(err => {
                    studentEmailDisplay.innerText = user.email;
                    authContainer.classList.add('hidden');
                    dashboardContainer.classList.remove('hidden');
                    loadMockTests();
                });
            } else {
                dashboardContainer.classList.add('hidden');
                authContainer.classList.remove('hidden');
            }
        });
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(cred => {
                    return db.collection('students').doc(cred.user.uid).set({
                        name: name,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    alert('Registration Successful!');
                    document.getElementById('register-form').reset();
                })
                .catch(err => alert("Firebase: " + err.message));
        });
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => document.getElementById('login-form').reset())
                .catch(err => alert("Firebase: " + err.message));
        });
        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.reload());
        });
        function loadMockTests() {
            testsList.innerHTML = '';
            db.collection('tests').orderBy('createdAt', 'desc').get().then(snapshot => {
                if (snapshot.empty) {
                    noTests.classList.remove('hidden');
                    return;
                }
                noTests.classList.add('hidden');
                snapshot.forEach(doc => {
                    const test = doc.data();
                    const card = document.createElement('div');
                    card.className = 'form-card rounded-xl p-6 shadow-md border-t-4 border-t-blue-500 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">${test.title || 'Untitled Test'}</h3>
                            <p class="text-gray-400 text-sm mb-4 line-clamp-2">${test.description || 'No description.'}</p>
                        </div>
                        <a href="${test.link || '#'}" target="_blank" class="w-full mt-4 text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
                            <i class="fas fa-play text-xs"></i> Start Exam
                        </a>
                    `;
                    testsList.appendChild(card);
                });
            }).catch(() => noTests.classList.remove('hidden'));
        }
    </script>
</body>
</html>
